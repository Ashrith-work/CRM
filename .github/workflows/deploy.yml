name: Deploy

# Optional CD. Runs on green main. Requires repository secrets:
#   RAILWAY_TOKEN, RAILWAY_SERVICE   (api)
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID   (web)
# If the secrets are absent the deploy steps are skipped, so this file is safe to keep.

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy API to Railway
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          npm i -g @railway/cli
          railway up --service "$RAILWAY_SERVICE" --detach

  deploy-web:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Web to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
